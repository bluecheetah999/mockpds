<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock PDS Demo - Personal Data Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ナビゲーションバー -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-database-fill"></i> Mock PDS Demo
            </a>
            <div class="navbar-nav ms-auto" id="userInfo" style="display: none;">
                <span class="navbar-text text-white me-3">
                    <i class="bi bi-person-circle"></i> <span id="username"></span>
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i> ログアウト
                </button>
            </div>
        </div>
    </nav>

    <!-- メインコンテンツ -->
    <div class="container mt-4">
        <!-- ログイン画面 -->
        <div id="loginScreen" class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">
                            <i class="bi bi-shield-lock"></i> Personal Data Store
                        </h2>
                        <p class="text-muted text-center">
                            あなたのデータを、あなた自身が管理する
                        </p>
                        
                        <ul class="nav nav-tabs mb-3" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">
                                    ログイン
                                </button>
                            </li>
                        </ul>
                        
                        <div class="tab-content">
                            <!-- ログインタブ -->
                            <div class="tab-pane fade show active" id="login" role="tabpanel">
                                <form onsubmit="handleLogin(event)">
                                    <div class="mb-3">
                                        <label for="loginEmail" class="form-label">メールアドレス</label>
                                        <input type="email" class="form-control" id="loginEmail" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">
                                        <i class="bi bi-box-arrow-in-right"></i> ログイン
                                    </button>
                                </form>
                            </div>
                            
                            <!-- 登録タブ -->
                            <div class="tab-pane fade" id="register" role="tabpanel">
                                <form onsubmit="handleRegister(event)">
                                    <div class="mb-3">
                                        <label for="registerUsername" class="form-label">ユーザー名</label>
                                        <input type="text" class="form-control" id="registerUsername" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="registerEmail" class="form-label">メールアドレス</label>
                                        <input type="email" class="form-control" id="registerEmail" required>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100">
                                        <i class="bi bi-person-plus"></i> 新規登録
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- メイン画面 -->
        <div id="mainScreen" style="display: none;">
            <!-- リポジトリ一覧 -->
            <div id="repositoryListView">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3><i class="bi bi-folder"></i> マイリポジトリ</h3>
                    <button class="btn btn-primary" onclick="showCreateRepoModal()">
                        <i class="bi bi-plus-circle"></i> 新規作成
                    </button>
                </div>
                <div id="repositoryList" class="row"></div>
            </div>

            <!-- レコード一覧 -->
            <div id="recordListView" style="display: none;">
                <div class="mb-3">
                    <button class="btn btn-secondary" onclick="showRepositoryList()">
                        <i class="bi bi-arrow-left"></i> リポジトリ一覧に戻る
                    </button>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3><i class="bi bi-file-earmark-text"></i> <span id="currentRepoName"></span></h3>
                    <div>
                        <button class="btn btn-info me-2" onclick="showShareModal()">
                            <i class="bi bi-share"></i> 共有設定
                        </button>
                        <button class="btn btn-primary" onclick="showCreateRecordModal()">
                            <i class="bi bi-plus-circle"></i> 新規作成
                        </button>
                    </div>
                </div>
                <div id="recordList"></div>
            </div>

            <!-- レコード詳細 -->
            <div id="recordDetailView" style="display: none;">
                <div class="mb-3">
                    <button class="btn btn-secondary" onclick="showRecordList()">
                        <i class="bi bi-arrow-left"></i> レコード一覧に戻る
                    </button>
                </div>
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h4 id="recordDetailTitle"></h4>
                        <div>
                            <button class="btn btn-sm btn-warning me-2" onclick="editRecord()">
                                <i class="bi bi-pencil"></i> 編集
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteCurrentRecord()">
                                <i class="bi bi-trash"></i> 削除
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="recordDetailContent"></div>
                        <hr>
                        <h5>変更履歴</h5>
                        <div id="recordHistory"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- リポジトリ作成モーダル -->
    <div class="modal fade" id="createRepoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新しいリポジトリを作成</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form onsubmit="handleCreateRepo(event)">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="repoName" class="form-label">リポジトリ名</label>
                            <input type="text" class="form-control" id="repoName" required>
                        </div>
                        <div class="mb-3">
                            <label for="repoDescription" class="form-label">説明</label>
                            <textarea class="form-control" id="repoDescription" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                        <button type="submit" class="btn btn-primary">作成</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- レコード作成/編集モーダル -->
    <div class="modal fade" id="recordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="recordModalTitle">新しいレコードを作成</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form onsubmit="handleSaveRecord(event)">
                    <div class="modal-body">
                        <div class="mb-3" id="recordKeyGroup">
                            <label for="recordKey" class="form-label">レコードキー</label>
                            <input type="text" class="form-control" id="recordKey" required>
                        </div>
                        <div class="mb-3">
                            <label for="recordType" class="form-label">レコードタイプ</label>
                            <select class="form-select" id="recordType">
                                <option value="com.example.note">メモ</option>
                                <option value="com.example.profile">プロフィール</option>
                                <option value="com.example.task">タスク</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="recordData" class="form-label">データ (JSON形式)</label>
                            <textarea class="form-control" id="recordData" rows="10" required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 共有設定モーダル -->
    <div class="modal fade" id="shareModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">共有設定</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <h6>アクセス権を付与</h6>
                    <form onsubmit="handleGrantAccess(event)" class="mb-3">
                        <div class="input-group">
                            <input type="text" class="form-control" id="granteeUserId" placeholder="ユーザーID" required>
                            <select class="form-select" id="grantPermission" style="max-width: 120px;">
                                <option value="read">読取</option>
                                <option value="write">書込</option>
                                <option value="admin">管理</option>
                            </select>
                            <button type="submit" class="btn btn-primary">付与</button>
                        </div>
                    </form>
                    <hr>
                    <h6>現在のアクセス権</h6>
                    <div id="aclList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
